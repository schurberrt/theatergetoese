<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theater Workshops – Spiel, Spaß & Bühne</title>
  
  <meta name="description" content="Theaterkurse: Improtheater, Clownerie, Kindertheater & mehr.">
  
  <style>
    :root {
      --color-bg:        #0f0f1a;
      --color-text:      #f0f0ff;
      --color-accent:    #e94560;
      --color-card:      #1a1a2e;
      --radius:          16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: 4rem 1rem 5rem;
      text-align: center;
    }

    header {
      margin-bottom: 6rem;
    }

    h1 {
      font-size: clamp(3.2rem, 11vw, 7rem);
      color: var(--color-accent);
      margin-bottom: 0.8rem;
      text-shadow: 0 4px 15px rgba(233,69,96,0.3);
    }

    .tagline {
      font-size: 1.6rem;
      opacity: 0.85;
      max-width: 800px;
      margin: 0 auto 1.5rem;
    }

    .workshops-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.2rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .workshop-tile {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .workshop-tile:hover {
      transform: translateY(-14px) scale(1.02);
      box-shadow: 0 24px 48px rgba(233,69,96,0.35);
    }

    .workshop-title {
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      font-weight: 700;
      padding: 4rem 2.5rem;
      color: #ffebee;
      line-height: 1.3;
    }

    footer {
      margin-top: 8rem;
      padding: 3rem 1rem 2.5rem;
      color: #8899aa;
      font-size: 0.98rem;
      border-top: 1px solid #222244;
    }

    footer a {
      color: #aaccff;
      text-decoration: none;
      margin: 0 1rem;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .workshop-title { padding: 3.5rem 2rem; font-size: 1.9rem; }
      h1 { font-size: 2.5rem; }
      body { padding: 4rem 1rem 7rem; }
      header { margin-bottom: 5rem; }
      .tagline { font-size: 1.4rem; }
      .workshops-tiles {
        gap: 1rem;
        padding: 0 1rem;
      }
    }

    @media (max-width: 600px) {
      body { padding: 3rem 0.8rem 6rem; }
      h1 { font-size: 2.5rem; }
      .tagline { font-size: 1.3rem; }
      .workshops-tiles {gap: 1rem}
      .workshop-title { padding: 3.5rem 2rem; font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>TheaterGetöse</h1>
    <p class="tagline">Spontanität · Kreativität · Gemeinsames Lachen</p>
    <div>
      <img src="Logo 20kb.png" alt="pictures" witdh="150">
    </div>
  </header>

  <div class="workshops-tiles">
    <a href="uber_mich.html" class="workshop-tile">
      <div class="workshop-title">Über Mich</div>
    </a>
    <a href="improgetöse.html" class="workshop-tile">
      <div class="workshop-title">ImproGetöse</div>
    </a>
    <a href="clownsgedönse.html" class="workshop-tile">
      <div class="workshop-title">ClownsGedönse</div>
    </a>
    <a href="kindertheater.html" class="workshop-tile">
      <div class="workshop-title">Kindertheater</div>
    </a>
  </div>

  <footer>
    <p> 2026 – TheaterGetöse<br>
       <a href="impressum.html">Impressum</a>  •  <a href="datenschutz.html">Datenschutz</a></p>
  </footer>

</body>
</html>

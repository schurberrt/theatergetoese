<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theater Workshops – Spiel, Spaß & Bühne</title>
  
  <meta name="description" content="Theaterkurse: Improtheater, Clownerie, Kindertheater & mehr.">
  
  <style>
    :root {
      --color-bg:        #ffffff;
      --color-text:      #1a2a3a;
      --color-accent:    #d32f2f; 
      --color-card:      #e3f2fd; 
      --color-card-hover: #1976d2; 
      --radius:          16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--color-text);
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
      text-align: center;
      
      /* SCHÄRFERER GRAPHISCHER VORHANG (Streifen-Look für Faltenwurf) */
      background: 
        /* Oberer Behang */
        linear-gradient(to bottom, #800a0a, #800a0a 20px, #a01010 20px, #a01010 40px, #600505 40px, #600505 50px, transparent 50px) top center / 100% 100% no-repeat,
        /* Linker Vorhang */
        linear-gradient(to right, #500000 0%, #500000 15%, #901010 15%, #901010 35%, #b01515 35%, #b01515 65%, #700808 65%, #700808 85%, #400000 85%, #400000 100%) top left / 12% 100% no-repeat,
        /* Rechter Vorhang */
        linear-gradient(to left, #500000 0%, #500000 15%, #901010 15%, #901010 35%, #b01515 35%, #b01515 65%, #700808 65%, #700808 85%, #400000 85%, #400000 100%) top right / 12% 100% no-repeat,
        #f5f7fa;
      background-attachment: fixed;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 20px auto 0;
      background: rgba(255, 255, 255, 0.98); 
      padding: 3rem 2rem;
      border-radius: var(--radius);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    header {
      margin-bottom: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .logo-container img {
      display: block;
      max-width: 140px;
      height: auto;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: var(--color-accent);
      margin-bottom: 0.5rem;
      font-weight: 800;
    }

    .tagline {
      font-size: 1.3rem;
      color: #556677;
      max-width: 800px;
      margin: 0 auto;
      font-weight: 500;
    }

    /* ZENTRIERTE KACHELN: Flexbox sorgt für perfekte Mittigkeit bei jeder Anzahl */
    .workshops-tiles {
      display: flex;
      flex-wrap: wrap;
      justify-content: center; /* Zentriert die Kacheln in der Zeile */
      gap: 2rem;
      max-width: 800px; /* Begrenzt die Breite für eine schöne 2x2 Anordnung */
      margin: 0 auto;
    }

    .workshop-tile {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(25, 118, 210, 0.12);
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                  background-color 0.3s ease, 
                  box-shadow 0.3s ease;
      text-decoration: none;
      color: #0d47a1;
      min-height: 180px;
      width: calc(50% - 1rem); /* Standardmäßig zwei Kacheln nebeneinander */
      min-width: 260px; /* Verhindert, dass sie zu schmal werden */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .workshop-tile:hover {
      transform: translateY(-10px) scale(1.03);
      background: var(--color-card-hover);
      color: #ffffff;
      box-shadow: 0 16px 32px rgba(25, 118, 210, 0.3);
    }

    .workshop-title {
      font-size: clamp(1.4rem, 3.5vw, 1.7rem);
      font-weight: 700;
      padding: 2rem 1.5rem;
      line-height: 1.3;
    }

    footer {
      margin-top: 6rem;
      padding-top: 2rem;
      color: #667788;
      font-size: 0.95rem;
      border-top: 1px solid #e0eaf5;
    }

    footer a {
      color: #1976d2;
      text-decoration: none;
      margin: 0 1rem;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* MOBIL-OPTIMIERUNG (Vorhang bleibt sichtbar, Kacheln untereinander) */
    @media (max-width: 768px) {
      body {
        padding: 2.5rem 0.8rem 3rem; /* Platz für den oberen und seitlichen Vorhang */
        /* Schmalerer Vorhang für mobile Bildschirme */
        background-size: 100% 40px, 8% 100%, 8% 100%;
      }
      .page-wrapper {
        padding: 2rem 1rem;
        margin-top: 15px;
      }
      .workshop-tile {
        width: 100%; /* Auf dem Handy alle Kacheln vollflächig untereinander */
      }
      h1 { font-size: 2.2rem; }
      .tagline { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <header>
      <div class="logo-container">
        <img src="Logo 20kb.png" alt="TheaterGetöse Logo">
      </div>
      <h1>TheaterGetöse</h1>
      <p class="tagline">Spontanität · Kreativität · Gemeinsames Lachen</p>
    </header>

    <div class="workshops-tiles">
      <a href="uber_mich.html" class="workshop-tile">
        <div class="workshop-title">Über Mich</div>
      </a>
      <a href="improgetöse.html" class="workshop-tile">
        <div class="workshop-title">ImproGetöse</div>
      </a>
      <a href="clownsgedönse.html" class="workshop-tile">
        <div class="workshop-title">ClownsGedönse</div>
      </a>
      <a href="kindertheater.html" class="workshop-tile">
        <div class="workshop-title">Kindertheater</div>
      </a>
    </div>

    <footer>
      <p>© 2026 – TheaterGetöse<br>
         <a href="impressum.html">Impressum</a>  •   <a href="datenschutz.html">Datenschutz</a></p>
    </footer>

  </div>

</body>
</html>
